<!doctype html><html lang="ru"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>СТО Домодедово — доступ</title>
<style>
:root{--bg:hsl(220 40% 8%);--card:hsl(220 40% 11%);--bd:hsl(217 19% 27%);--rev:hsl(217 91% 60%);--np:hsl(280 65% 60%);--mut:hsl(215 20% 65%);--red:hsl(0 72% 60%)}
*{box-sizing:border-box;margin:0}html,body{height:100%}body{background:var(--bg);color:#fff;font-family:'IBM Plex Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:34px 30px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;letter-spacing:1px;text-align:center;background:linear-gradient(90deg,var(--rev),var(--np));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{color:var(--mut);font-size:12.5px;text-align:center;margin-bottom:22px}
label{display:block;font-size:12px;color:var(--mut);margin:12px 0 5px}
input{width:100%;background:hsl(220 40% 14%);border:1px solid var(--bd);border-radius:9px;padding:11px 12px;color:#fff;font-size:14px;font-family:inherit}
input:focus{outline:none;border-color:var(--rev)}
button{width:100%;margin-top:20px;background:var(--rev);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
button:disabled{opacity:.6;cursor:wait}
.err{color:var(--red);font-size:12.5px;text-align:center;margin-top:14px;min-height:16px}
.hint{color:hsl(215 16% 42%);font-size:11px;text-align:center;margin-top:16px}
</style></head><body>

<label>Пароль</label><input id="pass" type="password" autocomplete="current-password">
<button type="submit" id="btn">Войти</button>
<div class="err" id="err"></div><div class="hint">Доступ ограничен</div>
</form>
